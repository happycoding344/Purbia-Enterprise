name: Build & Deploy to Hostinger

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SSH_HOST: 82.25.125.224
  SSH_PORT: 65002
  SSH_USER: u678926284
  DEPLOY_PATH: /home/u678926284/domains/purbiaenterprise.com/public_html/auth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build React App
        working-directory: ./frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://auth.purbiaenterprise.com/api

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy frontend dist to Hostinger
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" \
            scp -P $SSH_PORT -o StrictHostKeyChecking=no -r \
            ./frontend/dist/* \
            $SSH_USER@$SSH_HOST:$DEPLOY_PATH/public/

      - name: Deploy backend app directory
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" \
            rsync -avz --delete -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./backend/app/ \
            $SSH_USER@$SSH_HOST:$DEPLOY_PATH/app/

      - name: Deploy new migrations only
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" \
            rsync -avz -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./backend/database/migrations/ \
            $SSH_USER@$SSH_HOST:$DEPLOY_PATH/database/migrations/

      - name: Run post-deploy script (permissions + path fix)
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" \
            scp -P $SSH_PORT -o StrictHostKeyChecking=no \
            ./scripts/post-deploy.sh \
            $SSH_USER@$SSH_HOST:/tmp/post-deploy.sh
          
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" \
            ssh -p $SSH_PORT -o StrictHostKeyChecking=no \
            $SSH_USER@$SSH_HOST \
            "bash /tmp/post-deploy.sh"

      - name: Run Laravel Migrations and Cache
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" \
            ssh -p $SSH_PORT -o StrictHostKeyChecking=no \
            $SSH_USER@$SSH_HOST \
            "cd $DEPLOY_PATH && \
             /usr/bin/php artisan migrate --force && \
             /usr/bin/php artisan config:cache && \
             /usr/bin/php artisan route:cache && \
             echo 'Deployment complete!'"
