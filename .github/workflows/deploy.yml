name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Backend Dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader

      - name: 📦 Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: 📂 Merge Frontend Build to Backend Public
        run: cp -r frontend/dist/* backend/public/

      - name: 🚀 Sync to Hostinger server via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "backend/*"
          target: "/home/u678926284/domains/purbiaenterprise.com/public_html/auth"
          strip_components: 1

      - name: 🛠️ Execute Final Post-Deploy Scripts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/u678926284/domains/purbiaenterprise.com/public_html/auth
            php artisan migrate --force
            php artisan optimize:clear
