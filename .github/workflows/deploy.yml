name: Build & Deploy to Hostinger

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Build React App
        run: npm run build
        working-directory: ./frontend
        env:
          NODE_ENV: production

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add Hostinger to known hosts
        run: ssh-keyscan -p 65002 82.25.125.224 >> ~/.ssh/known_hosts

      - name: Deploy frontend to Hostinger
        run: |
          scp -P 65002 -r ./frontend/dist/* \
            u678926284@82.25.125.224:/home/u678926284/domains/purbiaenterprise.com/public_html/auth/public/

      - name: Deploy backend to Hostinger
        run: |
          # Sync app controllers and models
          rsync -avz --delete -e "ssh -p 65002" \
            ./backend/app/ \
            u678926284@82.25.125.224:/home/u678926284/domains/purbiaenterprise.com/public_html/auth/app/
          
          # Sync migrations
          rsync -avz -e "ssh -p 65002" \
            ./backend/database/migrations/ \
            u678926284@82.25.125.224:/home/u678926284/domains/purbiaenterprise.com/public_html/auth/database/migrations/

      - name: Run Laravel Migrations
        run: |
          ssh -p 65002 u678926284@82.25.125.224 \
            "cd /home/u678926284/domains/purbiaenterprise.com/public_html/auth && \
             /usr/bin/php artisan migrate --force && \
             /usr/bin/php artisan config:cache && \
             /usr/bin/php artisan route:cache"
